services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: winprob-backend
    env_file:
      - backend/.env
    volumes:
      - backend_user_data:/app/backend/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Frontend-MatchSummary-/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: winprob-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_user_data:
